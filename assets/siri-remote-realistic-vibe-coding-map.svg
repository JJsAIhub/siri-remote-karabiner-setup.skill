<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1900" viewBox="0 0 1400 1900" role="img" aria-labelledby="title desc">
  <title id="title">真实风格 Apple TV Siri Remote macOS vibe coding 映射图</title>
  <desc id="desc">以真实风格 Apple TV Siri Remote 图片为底图，标注 macOS vibe coding 控制映射。</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.50"/>
    </filter>
    <style>
      .title { font: 800 48px "Avenir Next", "PingFang SC", sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 22px "Avenir Next", "PingFang SC", sans-serif; fill: #b8c7dc; }
      .card { fill: url(#panel); stroke: #385675; stroke-width: 1.5; filter: url(#softShadow); }
      .cardTitle { font: 800 24px "Avenir Next", "PingFang SC", sans-serif; fill: #f8fafc; }
      .text { font: 560 18px "Avenir Next", "PingFang SC", sans-serif; fill: #d9e4f2; }
      .small { font: 500 15px "Avenir Next", "PingFang SC", sans-serif; fill: #90a4bd; }
      .badgeText { font: 800 16px "Avenir Next", "PingFang SC", sans-serif; fill: #07111f; }
      .line { stroke: #67e8f9; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.90; }
      .dot { fill: #67e8f9; stroke: #0f172a; stroke-width: 4; }
      .cyan { fill: #67e8f9; }
      .green { fill: #34d399; }
      .amber { fill: #fbbf24; }
      .rose { fill: #fb7185; }
    </style>
  </defs>

  <rect width="1400" height="1900" fill="#08111f"/>
  <circle cx="1220" cy="150" r="280" fill="#0ea5e9" opacity="0.10"/>
  <circle cx="120" cy="1680" r="310" fill="#34d399" opacity="0.08"/>

  <text x="70" y="88" class="title">Apple TV 遥控器控制 macOS</text>
  <text x="70" y="126" class="subtitle">真实遥控器底图 + vibe coding 映射：按钮交给 Karabiner，触摸滑动交给 SiriRemoteHIDProbe。</text>

  <g filter="url(#softShadow)">
    <image href="siri-remote-realistic-base.png" x="388" y="185" width="624" height="936" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g>
    <circle cx="700" cy="405" r="13" class="dot"/>
    <path d="M700 405 C610 405 535 380 455 342" class="line"/>
    <rect x="60" y="235" width="390" height="184" rx="28" class="card"/>
    <circle cx="98" cy="276" r="12" class="cyan"/>
    <text x="122" y="284" class="cardTitle">触摸面 / 方向环</text>
    <text x="92" y="328" class="text">滑动：移动鼠标指针</text>
    <text x="92" y="362" class="text">实体方向：键盘 ↑ ↓ ← →</text>
    <text x="92" y="394" class="small">默认双击确认键开启/关闭滑动</text>
  </g>

  <g>
    <circle cx="700" cy="449" r="13" class="dot"/>
    <path d="M700 449 C815 442 900 400 965 345" class="line"/>
    <rect x="965" y="235" width="370" height="188" rx="28" class="card"/>
    <circle cx="1003" cy="276" r="12" class="green"/>
    <text x="1027" y="284" class="cardTitle">确认键</text>
    <text x="997" y="328" class="text">单击：Enter</text>
    <text x="997" y="362" class="text">双击：触摸滑动开 / 关</text>
    <text x="997" y="394" class="small">可在 remote-settings.json 中改开关键</text>
  </g>

  <g>
    <circle cx="628" cy="612" r="13" class="dot"/>
    <path d="M628 612 C515 610 458 590 408 548" class="line"/>
    <rect x="60" y="470" width="345" height="166" rx="28" class="card"/>
    <circle cx="98" cy="511" r="12" class="amber"/>
    <text x="122" y="519" class="cardTitle">返回键</text>
    <text x="92" y="563" class="text">单击：鼠标左键 + Enter</text>
    <text x="92" y="597" class="text">双击：Control + ←</text>
  </g>

  <g>
    <circle cx="772" cy="612" r="13" class="dot"/>
    <path d="M772 612 C900 612 955 580 1000 540" class="line"/>
    <rect x="1000" y="470" width="335" height="166" rx="28" class="card"/>
    <circle cx="1038" cy="511" r="12" class="amber"/>
    <text x="1062" y="519" class="cardTitle">Home 键</text>
    <text x="1032" y="563" class="text">单击：鼠标右键</text>
    <text x="1032" y="597" class="text">双击：Control + →</text>
  </g>

  <g>
    <circle cx="627" cy="728" r="13" class="dot"/>
    <path d="M627 728 C508 725 452 743 407 790" class="line"/>
    <rect x="60" y="720" width="345" height="144" rx="28" class="card"/>
    <circle cx="98" cy="761" r="12" class="green"/>
    <text x="122" y="769" class="cardTitle">播放/暂停</text>
    <text x="92" y="814" class="text">单击：Space</text>
    <text x="92" y="846" class="small">也可配置为双击开关键</text>
  </g>

  <g>
    <circle cx="628" cy="846" r="13" class="dot"/>
    <path d="M628 846 C518 852 462 910 408 980" class="line"/>
    <rect x="60" y="920" width="345" height="184" rx="28" class="card"/>
    <circle cx="98" cy="961" r="12" class="rose"/>
    <text x="122" y="969" class="cardTitle">静音键</text>
    <text x="92" y="1013" class="text">单击：删除</text>
    <text x="92" y="1047" class="text">长按：全选 + 删除</text>
    <text x="92" y="1079" class="small">也可配置为双击开关键</text>
  </g>

  <g>
    <circle cx="772" cy="790" r="13" class="dot"/>
    <path d="M772 790 C910 790 960 820 1005 870" class="line"/>
    <rect x="1005" y="792" width="330" height="160" rx="28" class="card"/>
    <circle cx="1043" cy="833" r="12" class="cyan"/>
    <text x="1067" y="841" class="cardTitle">音量键</text>
    <text x="1037" y="886" class="text">音量 +：向上滚动</text>
    <text x="1037" y="920" class="text">音量 -：向下滚动</text>
  </g>

  <g>
    <circle cx="700" cy="1188" r="13" class="dot"/>
    <path d="M700 1188 C820 1190 920 1230 998 1290" class="line"/>
    <rect x="998" y="1210" width="337" height="152" rx="28" class="card"/>
    <circle cx="1036" cy="1251" r="12" class="green"/>
    <text x="1060" y="1259" class="cardTitle">底部握持区</text>
    <text x="1030" y="1304" class="text">无映射，避免误触</text>
    <text x="1030" y="1336" class="small">保留自然握持空间</text>
  </g>

  <g>
    <rect x="70" y="1450" width="1260" height="245" rx="34" fill="rgba(14,165,233,0.10)" stroke="#38bdf8" stroke-width="2"/>
    <text x="110" y="1510" class="cardTitle">如何调整映射</text>
    <text x="110" y="1560" class="text">1. 改开关滑动按键：编辑 remote-settings.json 的 touchMouseToggleButton。</text>
    <text x="110" y="1602" class="text">2. 改基础按键动作：编辑 tools/configure-touch-toggle.mjs 里的 buttonCatalog / createBaseManipulators。</text>
    <text x="110" y="1644" class="text">3. 应用：运行 configure-touch-toggle.mjs，检查 Karabiner 配置，再复制到 ~/.config/karabiner/karabiner.json。</text>
  </g>

  <g>
    <rect x="70" y="1725" width="1260" height="82" rx="24" fill="rgba(15,23,42,0.74)" stroke="#334155"/>
    <text x="110" y="1777" class="small">一键安装：node siri-remote-touch-mouse/tools/install-touch-mouse-app.mjs ｜ 预演：加 --dry-run</text>
  </g>
</svg>
